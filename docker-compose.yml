version: '3.7'

services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      APP_ENV: local
      APP_KEY: ""
    volumes:
      - ./refactored/storage:/var/www/html/storage
      - ./refactored/.env:/var/www/html/.env:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - omsnet

  db:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: omsdb
      MYSQL_USER: omsuser
      MYSQL_PASSWORD: omspass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "omsuser", "-pomspass"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - omsnet

volumes:
  db_data:

networks:
  omsnet:
